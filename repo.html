<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="git-container">

        <div class="section untracked">
            <span class="label black">Untracked Files</span>

            <div class="file-boxes">
                <div class="file">
                    📄
                    <span>index.html</span>
                </div>

                <div class="file">
                    📄
                    <span>style.css</span>
                </div>
            </div>
        </div>

        <div class="middle-row">
            <div class="section modified">
                <span class="label red">Modified Files</span>
            </div>

            <div class="section staging">
                <span class="label green">Staging Area</span>
            </div>
        </div>

        <div class="section commit">
            <span class="label blue">Commit History</span>
        </div>

        <div class="database">
            🛢️
            <span class="label dark-blue">Git Project</span>
        </div>

    </div>
</body>
</html>
